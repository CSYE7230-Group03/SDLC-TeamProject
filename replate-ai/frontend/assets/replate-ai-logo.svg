<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDA4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2BAE82;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9A3C;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4ECDA4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Plate icon -->
  <g filter="url(#softShadow)">
    <!-- Outer plate ring -->
    <circle cx="76" cy="80" r="58" fill="#F0FBF6"/>
    <circle cx="76" cy="80" r="50" fill="white"/>
    <circle cx="76" cy="80" r="50" fill="none" stroke="url(#plateGrad)" stroke-width="5"/>

    <!-- Inner plate ring hint -->
    <circle cx="76" cy="80" r="36" fill="none" stroke="#D6F5E8" stroke-width="2"/>

    <!-- Fork -->
    <g transform="translate(58, 52)">
      <rect x="6" y="0" width="2.5" height="22" rx="1.2" fill="url(#plateGrad)"/>
      <rect x="2" y="0" width="2" height="12" rx="1" fill="url(#plateGrad)"/>
      <rect x="10" y="0" width="2" height="12" rx="1" fill="url(#plateGrad)"/>
      <rect x="4" y="11" width="8" height="2.5" rx="1" fill="url(#plateGrad)"/>
    </g>

    <!-- Spoon -->
    <g transform="translate(84, 52)">
      <ellipse cx="5.5" cy="7" rx="5" ry="7" fill="url(#plateGrad)"/>
      <ellipse cx="5.5" cy="7" rx="3.5" ry="5" fill="white" opacity="0.4"/>
      <rect x="4.2" y="13" width="2.5" height="13" rx="1.2" fill="url(#plateGrad)"/>
    </g>

    <!-- AI spark / magic star -->
    <g transform="translate(96, 36)">
      <polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="url(#sparkGrad)"/>
    </g>
    <!-- small dot sparks -->
    <circle cx="116" cy="42" r="2.5" fill="#FFD166" opacity="0.7"/>
    <circle cx="122" cy="50" r="1.8" fill="#FF9A3C" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="152" y="72" font-family="'Georgia', serif" font-size="38" font-weight="700" letter-spacing="-1" fill="#1A2E24">Re</text>
  <text x="192" y="72" font-family="'Georgia', serif" font-size="38" font-weight="700" letter-spacing="-1" fill="url(#plateGrad)">plate</text>

  <!-- AI badge -->
  <rect x="153" y="82" width="28" height="16" rx="8" fill="url(#sparkGrad)"/>
  <text x="167" y="94" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">AI</text>

  <!-- Tagline -->
  <text x="191" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13.5" fill="#7ABFA0" letter-spacing="2" font-weight="400">LEFTOVER MAGIC</text>
</svg>
