<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replate AI — Logo Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F7FAF8; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px 20px; }

  h1 { text-align: center; font-family: 'DM Serif Display', serif; font-size: 18px; color: #999; margin-bottom: 48px; letter-spacing: 3px; text-transform: uppercase; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 860px; margin: 0 auto; }

  .card { border-radius: 20px; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }

  /* White bg */
  .bg-white { background: #ffffff; box-shadow: 0 2px 24px rgba(0,0,0,0.06); }
  .bg-white .label { color: #333; }

  /* Dark bg */
  .bg-dark { background: #162820; }
  .bg-dark .label { color: #fff; }

  /* Green bg */
  .bg-green { background: linear-gradient(135deg, #4ECDA4, #2BAE82); }
  .bg-green .label { color: #fff; }

  /* Warm bg */
  .bg-warm { background: #FFF8F0; box-shadow: 0 2px 24px rgba(0,0,0,0.06); }
  .bg-warm .label { color: #333; }

  svg { max-width: 100%; }

  /* Dark mode logo adaptation */
  .dark-logo text { fill: white !important; }
  .dark-logo text[fill="#1A2E24"] { fill: white !important; }
  .dark-logo text[fill="#7ABFA0"] { fill: #4ECDA4 !important; }
  .dark-logo circle[fill="#F0FBF6"] { fill: #1e3d30 !important; }
  .dark-logo circle[fill="white"] { fill: #1e3d30 !important; }
</style>
</head>
