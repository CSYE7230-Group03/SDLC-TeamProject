name: Deploy Frontend (Expo EAS)

on:
  push:
    branches: [main]
    paths:
      - 'replate-ai/frontend/**'
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: EAS Build (Preview APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: replate-ai/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: replate-ai/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        run: eas build --platform android --profile preview --non-interactive
